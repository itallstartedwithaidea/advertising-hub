name: Watch Own Repos for Releases
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  check-our-releases:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Check for new releases on our repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSIONS_FILE=".github/tracked-versions.json"
          if [ ! -f "$VERSIONS_FILE" ]; then
            echo '{}' > "$VERSIONS_FILE"
          fi

          OUR_REPOS=(
            "itallstartedwithaidea/google-ads-mcp"
            "itallstartedwithaidea/google-ads-api-agent"
            "itallstartedwithaidea/google-ads-gemini-extension"
            "itallstartedwithaidea/creative-asset-validator"
          )

          UPDATES=""

          for repo in "${OUR_REPOS[@]}"; do
            LATEST=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$repo/releases/latest" | jq -r '.tag_name // "none"' 2>/dev/null || echo "none")

            LATEST_SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$repo/commits?per_page=1" | jq -r 'if type == "array" then .[0].sha // "unknown" else "unknown" end' 2>/dev/null || echo "unknown")

            KNOWN_SHA=$(jq -r --arg repo "$repo" '.[$repo].sha // ""' "$VERSIONS_FILE" 2>/dev/null || echo "")

            if [ "$LATEST_SHA" != "unknown" ] && [ "$LATEST_SHA" != "$KNOWN_SHA" ] && [ -n "$KNOWN_SHA" ]; then
              UPDATES="$UPDATES\n- **$repo**: New commits (release: $LATEST)"
            fi

            jq --arg repo "$repo" --arg sha "$LATEST_SHA" --arg tag "$LATEST" \
              '.[$repo] = {"sha": $sha, "tag": $tag}' "$VERSIONS_FILE" > tmp.json && mv tmp.json "$VERSIONS_FILE"
          done

          if [ -n "$UPDATES" ]; then
            echo -e "Updates found:\n$UPDATES"
            gh issue create \
              --title "Repos updated — $(date +%Y-%m-%d)" \
              --body "$(echo -e "## Our Repos Updated\n$UPDATES\n\n*Auto-generated.*")" \
              --label "repo-sync" || true
          else
            echo "No updates found."
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VERSIONS_FILE"
          if ! git diff --cached --quiet; then
            git commit -m "chore: update tracked versions"
            git push
          fi
