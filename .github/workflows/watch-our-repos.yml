name: Watch Own Repos for Releases
on:
  schedule:
    - cron: '0 10 * * *'  # Daily 10am UTC
  workflow_dispatch:

jobs:
  check-our-releases:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases on our repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Track last-known versions in a file
          VERSIONS_FILE=".github/tracked-versions.json"
          if [ ! -f "$VERSIONS_FILE" ]; then
            echo '{}' > "$VERSIONS_FILE"
          fi

          OUR_REPOS=(
            "itallstartedwithaidea/google-ads-mcp"
            "itallstartedwithaidea/google-ads-api-agent"
            "itallstartedwithaidea/google-ads-gemini-extension"
            "itallstartedwithaidea/creative-asset-validator"
            "itallstartedwithaidea/agency-agents-enhanced"
          )

          UPDATES=""

          for repo in "${OUR_REPOS[@]}"; do
            # Get latest release tag
            LATEST=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$repo/releases/latest" | jq -r '.tag_name // "none"')

            # Get latest commit SHA on default branch
            LATEST_SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$repo/commits?per_page=1" | jq -r '.[0].sha // "unknown"')

            KNOWN_SHA=$(jq -r ".[\"$repo\"].sha // \"\"" "$VERSIONS_FILE")

            if [ "$LATEST_SHA" != "$KNOWN_SHA" ] && [ -n "$KNOWN_SHA" ]; then
              UPDATES="$UPDATES\n- 🆕 **$repo**: New commits since last check (release: $LATEST)"

              # Get commit messages since last known
              COMMITS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$repo/commits?per_page=5" | \
                jq -r '.[] | "  - \(.commit.message | split("\n")[0])"' | head -5)
              UPDATES="$UPDATES\n$COMMITS"
            fi

            # Update tracked version
            jq --arg repo "$repo" --arg sha "$LATEST_SHA" --arg tag "$LATEST" \
              '.[$repo] = {"sha": $sha, "tag": $tag}' "$VERSIONS_FILE" > tmp.json && mv tmp.json "$VERSIONS_FILE"
          done

          if [ -n "$UPDATES" ]; then
            echo -e "Updates found:\n$UPDATES"

            BODY="## Our Repos Updated — $(date +%Y-%m-%d)\n\nThe following repos have new commits:\n$UPDATES\n\n### Action Required\nReview changes and update the advertising-hub if needed:\n- Update references in \`platforms/\` README files\n- Update version numbers in \`mcp-servers/registry.yaml\`\n- Update wiki pages if features changed\n- Sync agent specs if capabilities changed\n\n---\n*Auto-generated by the release watcher workflow.*"

            gh issue create \
              --title "🔄 Our repos updated — $(date +%Y-%m-%d)" \
              --body "$(echo -e "$BODY")" \
              --label "repo-sync"
          fi

          # Commit updated versions file
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VERSIONS_FILE"
          if ! git diff --cached --quiet; then
            git commit -m "chore: update tracked versions"
            git push
          fi
