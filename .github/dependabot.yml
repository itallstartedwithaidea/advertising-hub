version: 2
updates:
  # Core Python package dependencies
  - package-ecosystem: "pip"
    directory: "/core"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "core-package"
    commit-message:
      prefix: "deps(core):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci:"

  # Node MCP template
  - package-ecosystem: "npm"
    directory: "/mcp-servers/templates/node-mcp-template"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "mcp-template"
    commit-message:
      prefix: "deps(mcp-template):"
